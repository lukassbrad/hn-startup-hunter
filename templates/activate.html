<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Pro – HN Startup Hunter</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
  h1 { font-size: 1.8rem; margin: 0 0 8px; color: #f8fafc; }
  p { color: #94a3b8; margin: 0 0 28px; line-height: 1.6; }
  input[type=email] { width: 100%; padding: 14px 16px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 1rem; box-sizing: border-box; margin-bottom: 14px; outline: none; }
  input[type=email]:focus { border-color: #6366f1; }
  button { width: 100%; padding: 14px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #4f46e5; }
  .msg { margin-top: 18px; padding: 12px; border-radius: 8px; display: none; }
  .msg.success { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #86efac; }
  .msg.error { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #fca5a5; }
  .back { margin-top: 20px; }
  .back a { color: #6366f1; text-decoration: none; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:2.5rem;margin-bottom:12px">🔑</div>
  <h1>Activate Pro Access</h1>
  <p>Enter the email you used to purchase HN Startup Hunter Pro and we'll unlock your account immediately.</p>
  <input type="email" id="emailInput" placeholder="your@email.com" autofocus>
  <button onclick="activate()">Activate My Account</button>
  <div id="msg" class="msg"></div>
  <div class="back"><a href="/">← Back to HN Startup Hunter</a></div>
</div>
<script>
async function activate() {
  var email = document.getElementById("emailInput").value.trim();
  var msg = document.getElementById("msg");
  if (!email) { showMsg("Please enter your email address.", "error"); return; }
  try {
    var resp = await fetch("/activate", {
      method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: "email=" + encodeURIComponent(email),
      credentials: "include"
    });
    var data = await resp.json();
    if (resp.ok && data.status === "activated") {
      showMsg("✅ Pro access activated! Redirecting you now…", "success");
      setTimeout(function(){ window.location.href = "/"; }, 1500);
    } else {
      showMsg("❌ Email not found. Make sure you're using the email from your purchase receipt. <a href=\"https://bradauto.lemonsqueezy.com/checkout/buy/96ddcb80-0ed2-48af-a4e5-3fe87df49166\" style=\"color:#818cf8\" target=\"_blank\">Buy Pro →</a>", "error");
    }
  } catch(e) {
    showMsg("Network error – please try again.", "error");
  }
}
function showMsg(text, type) {
  var msg = document.getElementById("msg");
  msg.innerHTML = text;
  msg.className = "msg " + type;
  msg.style.display = "block";
}
document.getElementById("emailInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") activate();
});
</script>
</body>
</html>
